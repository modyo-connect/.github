name-template: 'v$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
filter-by-commitish: true
#commitish: 'main'
template: |
  ## What’s Changed?
  $CHANGES
  ## Contributors
  $CONTRIBUTORS
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'feat'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'revert'
  - title: '🎨 Refactor'
    labels:
      - 'refactor'
      - 'style'
      - 'perf'
  - title: '🧰 Maintenance'
    labels:
      - 'build'
      - 'chore'
      - 'ci'
  - title: '📝 Docs/Test'
    labels:
      - 'docs'
      - 'test'
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
      - 'feat'
  patch:
    labels:
      - 'patch'
  default: patch
